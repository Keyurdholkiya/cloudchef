services:
  web:
    build: ./cloudchef
    ports:
      - "8000:8000"
    environment:
      DEBUG: "true"
      DATABASE_PATH: /data/db.sqlite3
      SEED_DEMO: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    volumes:
      - cloudchef_data:/data
      - ./media:/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  cloudchef_data:
