{% extends "chef_panel_base.html" %}

{% block chef_page %}
<style>
  .adddish-hero {
    background: linear-gradient(120deg, #fff2f2, #fff8ef);
    border: 1px solid #f7d5d5;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .adddish-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 14px;
  }
  .upload-wrap {
    border: 2px dashed #ef4444;
    border-radius: 14px;
    background: #fff;
    min-height: 280px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
  }
  .upload-preview {
    width: 100%;
    height: 220px;
    border-radius: 10px;
    object-fit: cover;
    margin-bottom: 8px;
    border: 1px solid #f0e2e2;
  }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-chip {
    border: 1px solid #d3d9e7;
    border-radius: 999px;
    padding: 8px 14px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
  }
  .type-chip input { display: none; }
  .type-chip.active-veg { background: #e7f9ec; border-color: #1e9b43; color: #1e9b43; }
  .type-chip.active-nonveg { background: #ffecec; border-color: #d62828; color: #d62828; }
  .form-box {
    background: #fff;
    border: 1px solid #e9edf5;
    border-radius: 14px;
    padding: 14px;
  }
  .time-note {
    margin-top: 8px;
    padding: 10px 12px;
    border-radius: 12px;
    background: #fff6e8;
    border: 1px solid #f6dcc0;
    color: #8a4a12;
    font-size: 13px;
    font-weight: 600;
  }
  .form-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
  .btn-primary-red {
    border: 0;
    border-radius: 10px;
    padding: 11px 18px;
    font-weight: 800;
    color: #fff;
    background: linear-gradient(90deg, #ef1d1d, #cf0000);
  }
  @media (max-width: 1000px) {
    .adddish-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 575.98px) {
    .adddish-hero {
      padding: 12px;
      border-radius: 12px;
    }
    .upload-wrap {
      min-height: 220px;
      border-radius: 12px;
    }
    .upload-preview {
      height: 180px;
    }
    .form-box {
      padding: 12px;
      border-radius: 12px;
    }
    .btn-primary-red,
    .form-box .btn {
      width: 100%;
    }
    .form-box .d-flex.justify-content-between {
      flex-direction: column-reverse;
      gap: 10px;
    }
  }
</style>

<section class="cp-content-card">
  <div class="adddish-hero d-flex justify-content-between align-items-center gap-2 flex-wrap">
    <div>
      <h3 class="mb-1">Add New Dish</h3>
      <div class="text-muted">Create a new menu item and publish it instantly to Shop.</div>
    </div>
    <a class="btn btn-outline-danger fw-bold" href="{% url 'chef_my_dishes' %}">View My Dishes</a>
  </div>

  <form method="POST" enctype="multipart/form-data" class="adddish-grid">
    {% csrf_token %}
    <input type="hidden" name="is_available" value="on">

    <label for="dish-image" class="upload-wrap">
      <img id="dish-preview" class="upload-preview d-none" alt="Dish Preview">
      <div id="upload-empty">
        <div style="font-size: 42px;">Upload</div>
        <div class="fw-bold">Click to upload dish photo</div>
        <small class="text-muted">JPG, PNG (recommended 1:1)</small>
      </div>
      <input id="dish-image" type="file" name="image" accept="image/*" hidden>
    </label>

    <div class="form-box">
      <div class="form-title">Dish Details</div>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Dish Name</label>
          <input type="text" class="form-control" name="name" placeholder="Paneer Butter Masala" value="{{ dish_form.name|default:'' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Category</label>
          <select class="form-select" name="category">
            <option>Main Course</option>
            <option>Snacks</option>
            <option>Breakfast</option>
            <option>Dessert</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Price (Rs)</label>
          <input type="number" class="form-control" name="price" min="1" step="0.01" placeholder="250" value="{{ dish_form.price|default:'' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Keep Dish Live For</label>
          <div class="row g-2">
            <div class="col-6">
              <select class="form-select" name="availability_hours" required>
                <option value="0" {% if dish_form.availability_hours == "0" %}selected{% endif %}>0 hr</option>
                <option value="1" {% if dish_form.availability_hours == "1" %}selected{% endif %}>1 hr</option>
                <option value="2" {% if dish_form.availability_hours == "2" %}selected{% endif %}>2 hr</option>
                <option value="3" {% if dish_form.availability_hours == "3" %}selected{% endif %}>3 hr</option>
                <option value="4" {% if dish_form.availability_hours == "4" %}selected{% endif %}>4 hr</option>
                <option value="5" {% if dish_form.availability_hours == "5" %}selected{% endif %}>5 hr</option>
                <option value="6" {% if dish_form.availability_hours == "6" %}selected{% endif %}>6 hr</option>
                <option value="7" {% if dish_form.availability_hours == "7" %}selected{% endif %}>7 hr</option>
                <option value="8" {% if dish_form.availability_hours == "8" %}selected{% endif %}>8 hr</option>
                <option value="9" {% if dish_form.availability_hours == "9" %}selected{% endif %}>9 hr</option>
                <option value="10" {% if dish_form.availability_hours == "10" %}selected{% endif %}>10 hr</option>
                <option value="11" {% if dish_form.availability_hours == "11" %}selected{% endif %}>11 hr</option>
                <option value="12" {% if dish_form.availability_hours == "12" %}selected{% endif %}>12 hr</option>
              </select>
            </div>
            <div class="col-6">
              <select class="form-select" name="availability_minutes" required>
                <option value="0" {% if dish_form.availability_minutes == "0" %}selected{% endif %}>0 min</option>
                <option value="15" {% if dish_form.availability_minutes == "15" %}selected{% endif %}>15 min</option>
                <option value="30" {% if dish_form.availability_minutes == "30" %}selected{% endif %}>30 min</option>
                <option value="45" {% if dish_form.availability_minutes == "45" %}selected{% endif %}>45 min</option>
              </select>
            </div>
          </div>
          <div class="time-note">Chef jitna time select karega, uske baad dish automatically shop se hide ho jayegi.</div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Food Type</label>
          <div class="chip-row">
            <label class="type-chip active-veg" id="veg-chip">
              <input type="radio" name="food_type" value="veg" checked> Veg
            </label>
            <label class="type-chip" id="nonveg-chip">
              <input type="radio" name="food_type" value="non-veg"> Non-Veg
            </label>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Description</label>
          <textarea class="form-control" rows="4" name="description" placeholder="Describe taste, quantity, and special ingredients...">{{ dish_form.description|default:'' }}</textarea>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-3">
        <button type="reset" class="btn btn-outline-secondary">Reset</button>
        <button type="submit" class="btn-primary-red">+ Add Dish</button>
      </div>
    </div>
  </form>
</section>

<script>
  (function () {
    const input = document.getElementById("dish-image");
    const preview = document.getElementById("dish-preview");
    const empty = document.getElementById("upload-empty");
    const vegChip = document.getElementById("veg-chip");
    const nonvegChip = document.getElementById("nonveg-chip");

    input.addEventListener("change", function () {
      const file = this.files && this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        preview.classList.remove("d-none");
        empty.classList.add("d-none");
      };
      reader.readAsDataURL(file);
    });

    vegChip.addEventListener("click", function () {
      vegChip.classList.add("active-veg");
      nonvegChip.classList.remove("active-nonveg");
    });
    nonvegChip.addEventListener("click", function () {
      nonvegChip.classList.add("active-nonveg");
      vegChip.classList.remove("active-veg");
    });
  })();
</script>
{% endblock %}
