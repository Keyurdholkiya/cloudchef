{% extends "utils/base.html" %}

{% block start %}
<div class="container py-4 py-md-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-11 col-md-8 col-lg-5 col-xl-4">
      <div class="card shadow p-3 p-sm-4 cc-auth-card border-0">
        <h3 class="text-center mb-2">Create Chef Account</h3>
        <p class="text-muted text-center small mb-3">Chef Console ke liye dedicated account banao.</p>
        <hr>
        <form method="POST" class="cc-auth-form">
          {% include "alerts.html" %}
          {% csrf_token %}
          <div class="mb-3"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Email address</label><input type="email" name="email" value="{{ prefill_email }}" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Phone Number</label><input type="text" name="phone_number" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" minlength="8" class="form-control" required></div>
          <div class="d-grid"><button type="submit" class="btn btn-primary">Create Chef Account</button></div>
        </form>
        <div class="mt-3 text-center"><a href="{% url 'chef_login_page' %}" class="small">Already a chef? Chef Login</a></div>
        <div class="mt-2 text-center"><a href="{% url 'register' %}" class="small">Create Customer Account</a></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
