{% extends "utils/base.html" %}

{% block start %}
<div class="container py-5">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4 cc-shop-header">
        <div>
            <h2 class="mb-1">Shop</h2>
            <p class="mb-0 text-muted">Handpicked homemade dishes from local chefs, ready for your cart.</p>
        </div>
        <form method="get" class="cc-shop-filter-form">
            <input type="text" name="search" class="form-control" placeholder="Search dish, chef, area..." value="{{ search }}">
            <input type="number" min="0" name="min_price" class="form-control" placeholder="Min Rs." value="{{ min_price }}">
            <input type="number" min="0" name="max_price" class="form-control" placeholder="Max Rs." value="{{ max_price }}">
            <select name="sort" class="form-select">
                <option value="newest" {% if sort == "newest" %}selected{% endif %}>Newest</option>
                <option value="rating" {% if sort == "rating" %}selected{% endif %}>Top rated</option>
                <option value="price_low" {% if sort == "price_low" %}selected{% endif %}>Price: low to high</option>
                <option value="price_high" {% if sort == "price_high" %}selected{% endif %}>Price: high to low</option>
            </select>
            <button class="btn btn-outline-primary" type="submit">Search</button>
        </form>
    </div>

    <div id="ccShopDishesGrid">
      {% include "partials/shop_dishes_grid.html" with dishes=dishes %}
    </div>
</div>
<script>
  (function () {
    const grid = document.getElementById("ccShopDishesGrid");
    if (!grid) return;
    const withShimmerRefresh = (node, render) => {
      node.classList.add("cc-live-refresh");
      render();
      window.setTimeout(() => node.classList.remove("cc-live-refresh"), 520);
    };
    let lastHtml = grid.innerHTML.trim();
    window.setInterval(async () => {
      try {
        const params = new URLSearchParams();
        const searchInput = document.querySelector('input[name="search"]');
        const minInput = document.querySelector('input[name="min_price"]');
        const maxInput = document.querySelector('input[name="max_price"]');
        const sortInput = document.querySelector('select[name="sort"]');
        const currentSearch = searchInput ? searchInput.value.trim() : "";
        if (currentSearch) params.set("search", currentSearch);
        if (minInput && minInput.value.trim()) params.set("min_price", minInput.value.trim());
        if (maxInput && maxInput.value.trim()) params.set("max_price", maxInput.value.trim());
        if (sortInput && sortInput.value) params.set("sort", sortInput.value);
        const response = await fetch("{% url 'shop_dishes_partial' %}?" + params.toString(), {
          headers: { "X-Requested-With": "XMLHttpRequest" }
        });
        const data = await response.json();
        if (typeof data.html === "string" && data.html.trim() !== lastHtml) {
          withShimmerRefresh(grid, () => {
            grid.innerHTML = data.html;
            lastHtml = data.html.trim();
          });
        }
      } catch (error) {}
    }, 12000);
  })();
</script>
{% endblock %}
