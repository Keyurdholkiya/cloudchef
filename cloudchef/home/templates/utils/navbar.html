{% load static %}

<nav class="navbar navbar-expand-lg cc-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'index' %}">
      <img src="{% static 'images/home/brigade_logo.jpg' %}" alt="Cloud Chef" width="42" height="42" class="rounded-circle border border-2 border-light-subtle" loading="eager" decoding="async">
      <span class="fw-bold text-light">Cloud Chef</span>
    </a>

    <a class="cc-mobile-chef-switch" href="{% url 'chef_side' %}" data-chef-switch="true" aria-label="Open Chef Side">
      <span class="cc-mobile-chef-switch-copy">Chef Side</span>
      <span class="cc-chef-switch-track">
        <span class="cc-chef-switch-thumb"><i class="fa fa-cutlery" aria-hidden="true"></i></span>
      </span>
    </a>

    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#ccNav" aria-controls="ccNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="ccNav">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'shop' %}">Shop</a></li>
        <li class="nav-item">
          <a class="nav-link cc-chef-switch" href="{% url 'chef_side' %}" data-chef-switch="true">
            <span class="cc-chef-switch-track">
              <span class="cc-chef-switch-thumb"><i class="fa fa-cutlery" aria-hidden="true"></i></span>
            </span>
            <span>Chef Side</span>
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-2 cc-nav-actions">
        <a href="{% url 'cart_page' %}" class="btn cc-btn-outline cc-icon-btn position-relative" id="ccCartButton" title="Cart" aria-label="Cart">
          <i class="fa fa-shopping-cart" aria-hidden="true"></i>
          {% if cart_count > 0 %}
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="ccCartBadge">{{ cart_count }}</span>
          {% endif %}
        </a>
        {% if request.user.is_authenticated %}
        <a href="{% url 'notification_center' %}" class="btn cc-btn-outline cc-icon-btn position-relative" id="ccNotifBell" title="Alerts" aria-label="Alerts">
          <i class="fa fa-bell" aria-hidden="true"></i>
          {% if unread_notification_count > 0 %}
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="ccNotifBadge">{{ unread_notification_count }}</span>
          {% endif %}
        </a>
        <a href="{% url 'past_orders' %}" class="btn cc-btn-outline cc-icon-btn" title="My Orders" aria-label="My Orders">
          <i class="fa fa-shopping-bag" aria-hidden="true"></i>
        </a>
        <a href="{% url 'customer_settings' %}" class="btn cc-btn-outline cc-icon-btn" title="Settings" aria-label="Settings">
          <i class="fa fa-cog" aria-hidden="true"></i>
        </a>
        <a href="{% url 'logout_user' %}" class="btn cc-btn-outline cc-icon-btn" title="Logout" aria-label="Logout">
          <i class="fa fa-sign-out" aria-hidden="true"></i>
        </a>
        {% else %}
        <a href="{% url 'login_page' %}" class="btn cc-btn-outline cc-icon-btn" title="Login" aria-label="Login">
          <i class="fa fa-sign-in" aria-hidden="true"></i>
        </a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
