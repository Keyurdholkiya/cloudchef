name: This my project to make the image and push it to docker hub
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cloudchef/requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: ./cloudchef
          file: ./cloudchef/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-project:v1.0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}

            script: |
                docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-project:v1.0

                docker stop cloudchef || true
                docker rm cloudchef || true

                docker run -d \
                --name cloudchef \
                -p 8000:8000 \
                ${{ secrets.DOCKERHUB_USERNAME }}/my-project:v1.0